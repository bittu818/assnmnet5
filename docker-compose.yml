version: '3'

services:

  app:
    build: .
    image: sridharkovela/assignment5-app:v1
    container_name: assignment5-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: assignmentdb
    ports:
      - "3306:3306"
