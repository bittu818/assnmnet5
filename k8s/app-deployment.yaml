apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment5-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assignment5-app
  template:
    metadata:
      labels:
        app: assignment5-app
    spec:
      containers:
      - name: assignment5-app
        image: sridharkovvela/assignment5-app:v1
        ports:
        - containerPort: 8080
